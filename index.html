<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>AOC — Color de Ojos</title>
  <meta name="theme-color" content="#0f1117">
  <link rel="manifest" href="manifest.webmanifest">
  <!-- iPad / iOS: pantalla completa al agregar a inicio -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AOC">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand">
        <span class="dot"></span> AOC <small>· Color de Ojos</small>
      </div>
      <div class="mode-switch" id="modeSwitch">
        <button class="mode-btn active" data-mode="live">🎥 En vivo</button>
        <button class="mode-btn" data-mode="photo">📸 Foto</button>
      </div>
      <div class="top-actions">
        <select id="camera" class="cam-select" title="Elegir cámara"></select>
        <button id="snapBtn" class="btn ghost" title="Capturar foto de la cámara">Capturar</button>
        <button id="openBtn" class="btn ghost">Abrir foto…</button>
        <button id="saveBtn" class="btn primary">Guardar</button>
      </div>
    </header>

    <main class="stage">
      <div class="viewport" id="viewport">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="output"></canvas>
        <div id="status" class="status">Iniciando…</div>
        <div class="lens-strip" id="lensStrip"><!-- generado por JS --></div>
      </div>

      <aside class="panel">
        <section class="controls">
          <label class="ctl">
            <span>Intensidad <b id="opacityVal">90%</b></span>
            <input type="range" id="opacity" min="0" max="100" value="90">
          </label>
          <label class="ctl">
            <span>Tamaño del iris <b id="scaleVal">100%</b></span>
            <input type="range" id="scale" min="80" max="130" value="100">
          </label>
          <label class="ctl">
            <span>Mezcla</span>
            <select id="blend">
              <option value="natural" selected>Natural (respeta brillo)</option>
              <option value="vivid">Vívido</option>
              <option value="tint">Tinte suave</option>
            </select>
          </label>
          <label class="ctl toggle">
            <input type="checkbox" id="showMesh"> <span>Ver detección</span>
          </label>
        </section>
        <section class="hint">
          <p>Elige un lente en la barra inferior 👇</p>
        </section>
      </aside>
    </main>
  </div>

  <script type="module" src="app.js"></script>
  <script>
    // Registro del service worker (offline / PWA).
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch((e) => console.warn('SW:', e.message));
      });
    }
  </script>
</body>
</html>
