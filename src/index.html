<div id="app">
  <header class="topbar">
    <div class="brand">
      <span class="dot"></span> AOC <small>· Color de Ojos</small>
    </div>
    <div class="mode-switch" id="modeSwitch">
      <button class="mode-btn active" data-mode="live">🎥 En vivo</button>
      <button class="mode-btn" data-mode="photo">📸 Foto</button>
    </div>
    <div class="top-actions">
      <select id="camera" class="cam-select" title="Elegir cámara"></select>
      <button id="snapBtn" class="btn ghost" title="Capturar foto de la cámara">Capturar</button>
      <button id="openBtn" class="btn ghost">Abrir foto…</button>
      <button id="saveBtn" class="btn primary">Guardar</button>
    </div>
  </header>

  <main class="stage">
    <div class="viewport" id="viewport">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="output"></canvas>
      <div id="status" class="status">Iniciando…</div>
      <!-- Selector de lentes tipo cámara: fila horizontal deslizable -->
      <div class="lens-strip" id="lensStrip"><!-- generado por JS --></div>
    </div>

    <aside class="panel">
      <section class="controls">
        <label class="ctl">
          <span>Intensidad <b id="opacityVal">90%</b></span>
          <input type="range" id="opacity" min="0" max="100" value="90">
        </label>
        <label class="ctl">
          <span>Tamaño del iris <b id="scaleVal">100%</b></span>
          <input type="range" id="scale" min="80" max="130" value="100">
        </label>
        <label class="ctl">
          <span>Mezcla</span>
          <select id="blend">
            <option value="natural" selected>Natural (respeta brillo)</option>
            <option value="vivid">Vívido</option>
            <option value="tint">Tinte suave</option>
          </select>
        </label>
        <label class="ctl toggle">
          <input type="checkbox" id="showMesh"> <span>Ver detección</span>
        </label>
      </section>
      <section class="hint">
        <p>Elige un lente en la barra inferior 👇</p>
      </section>
    </aside>
  </main>
</div>

<link rel="stylesheet" href="styles.css">
<script type="module" src="app.js"></script>
